version: "3.9"

# ============================================================
# Local development stack
#   - PostgreSQL  — your database          → localhost:5432
#   - MinIO       — local S3 replacement   → localhost:9000 (API)
#                                          → localhost:9001 (browser UI)
#   - Airflow     — pipeline scheduler     → localhost:8080
#
# Start everything:  docker compose up -d
# Stop everything:   docker compose down
# ============================================================

x-airflow-common: &airflow-common
  image: apache/airflow:2.8.4-python3.11
  env_file: .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow_db
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__SECRET_KEY: dev-secret-change-in-prod
    # Override host-machine DB settings for Docker networking
    POSTGRES_HOST: postgres
    POSTGRES_PORT: "5432"
    # Storage — point Airflow tasks at MinIO inside Docker network
    STORAGE_BACKEND: ${STORAGE_BACKEND:-minio}
    MINIO_ENDPOINT: http://minio:9000
  volumes:
    - ./dags:/opt/airflow/dags
    - ./data:/opt/airflow/data
    - ./config:/opt/airflow/config
    - ./features:/opt/airflow/features
    - ./sentiment:/opt/airflow/sentiment
    - ./storage:/opt/airflow/storage      # shared local storage (used when STORAGE_BACKEND=local)
    - ./requirements.txt:/requirements.txt
    - airflow_logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
    minio:
      condition: service_healthy

services:
  # ------------------------------------------------------------------
  # PostgreSQL — primary database
  # ------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-finance_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB:       ${POSTGRES_DB:-financedb}
    ports:
      - "5433:5432"   # host 5433 → container 5432 (avoid clash with local Postgres)
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./db/migrations/001_phase2_tables.sql:/docker-entrypoint-initdb.d/02_phase2.sql
      - ./db/migrations/002_phase3_sentiment.sql:/docker-entrypoint-initdb.d/03_phase3.sql
      - ./scripts/init_airflow_db.sql:/docker-entrypoint-initdb.d/04_airflow_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finance_user} -d ${POSTGRES_DB:-financedb}"]
      interval: 5s
      retries: 10

  # ------------------------------------------------------------------
  # MinIO — local S3-compatible object storage
  #   Browser UI:  http://localhost:9001
  #   Login:       minioadmin / minioadmin  (set in .env to change)
  #   API:         http://localhost:9000
  # ------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"   # S3-compatible API (boto3 talks here)
      - "9001:9001"   # Browser console (you browse here)
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9000' 2>/dev/null"]
      interval: 5s
      retries: 15

  # Creates the default bucket on first startup
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
        mc mb --ignore-existing local/${S3_BUCKET:-finance-data};
        echo 'Bucket ready.';
      "
    restart: "no"

  # ------------------------------------------------------------------
  # Airflow
  # ------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    command: bash -c "pip install --no-cache-dir -r /requirements.txt && airflow db migrate && airflow users create --username admin --password admin --firstname Finance --lastname Admin --role Admin --email admin@example.com"
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    command: bash -c "pip install --no-cache-dir -r /requirements.txt && airflow webserver"
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: bash -c "pip install --no-cache-dir -r /requirements.txt && airflow scheduler"
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres_data:
  minio_data:
  airflow_logs:
