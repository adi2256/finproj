name: Weekly SEC Filings
on:
  schedule:
    - cron: '0 2 * * 0'  # Sunday 2 AM UTC
  workflow_dispatch: {}

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 200
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      STORAGE_BACKEND: b2
      B2_ENDPOINT: ${{ secrets.B2_ENDPOINT }}
      B2_APPLICATION_KEY_ID: ${{ secrets.B2_APPLICATION_KEY_ID }}
      B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
      B2_BUCKET: ${{ secrets.B2_BUCKET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements-pipelines.txt
      - run: pip install -r requirements-pipelines.txt
      - name: Fetch SEC filings
        run: python -c "from data.ingestion.sec_filings import run; print(f'Stored {run()} filings')"
      - name: Cleanup old filings
        run: python -c "from data.storage.s3_client import cleanup_old_filings; r = cleanup_old_filings(keep_days=365, include_unscored=True, dry_run=False); print(f'Cleaned {r[\"deleted\"]} files, freed {r[\"freed_bytes\"]/1024**2:.0f} MB')"
