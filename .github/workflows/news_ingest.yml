name: News Ingest (3x daily)
on:
  schedule:
    - cron: '0 14 * * 1-5'   # 9 AM ET
    - cron: '0 18 * * 1-5'   # 1 PM ET
    - cron: '0 22 * * 1-5'   # 5 PM ET
  workflow_dispatch: {}

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      STORAGE_BACKEND: b2
      B2_ENDPOINT: ${{ secrets.B2_ENDPOINT }}
      B2_APPLICATION_KEY_ID: ${{ secrets.B2_APPLICATION_KEY_ID }}
      B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
      B2_BUCKET: ${{ secrets.B2_BUCKET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements-pipelines.txt
      - run: pip install -r requirements-pipelines.txt
      - name: Ingest news articles
        run: python -c "from data.ingestion.news_data import run; print(f'Stored {run(lookback_hours=4)} articles')"
