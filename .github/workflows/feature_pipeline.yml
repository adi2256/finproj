name: Feature Pipeline
on:
  schedule:
    - cron: '30 12 * * 1,3,5'  # Mon/Wed/Fri 7:30 AM ET
  workflow_dispatch: {}

jobs:
  compute:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements-pipelines.txt
      - run: pip install -r requirements-pipelines.txt
      - name: Run feature pipeline (incremental)
        run: python -m features.pipeline --mode incremental
